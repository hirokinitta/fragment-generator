name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go backend
        working-directory: backend
        run: |
          go build -ldflags="-s -w" -o ../app/resources/backend.exe .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Next.js frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Electron deps & package
        run: |
          npm ci
          npm run build

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.nsis.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
